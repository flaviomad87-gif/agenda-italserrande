name: Keep Render backend awake

# Pinga il backend FastAPI ogni 13 minuti SOLO negli orari di lavoro
# (Lun-Sab, 6:00-20:00 Italy time) per restare entro le 750 ore/mese
# del piano free di Render.
#
# Cron note: GitHub Actions usa UTC. L'Italia è UTC+1 (inverno) o UTC+2 (estate).
# Per coprire entrambe le stagioni in modo robusto usiamo 4:00-19:00 UTC:
#   - In estate (CEST, UTC+2) → copre 06:00-21:00 Italy
#   - In inverno (CET,  UTC+1) → copre 05:00-20:00 Italy
# In entrambi i casi la finestra 06:00-20:00 richiesta è coperta.
#
# Consumo stimato sul piano free:
#   - 14h × 26 giorni = ~364h/mese sul servizio principale
#   - Restano ~386h di margine sui 750h/mese del workspace Render
#
# Consumo GitHub Actions:
#   - ~5 ping/h × 15h × 26 giorni = ~1.950 run/mese × ~10s = ~325 min/mese
#   - Sotto il limite gratuito di 2.000 min/mese anche su repo privato.

on:
  schedule:
    # Ogni 13 minuti, dalle 4:00 alle 19:59 UTC, da Lunedì a Sabato (1-6).
    # Cron giorno-settimana: 0=Dom, 1=Lun, ..., 6=Sab.
    - cron: "*/13 4-19 * * 1-6"
  workflow_dispatch:           # permette lancio manuale dalla UI di GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          set -e
          URL="https://agenda-italserrande-api.onrender.com/api/"
          echo "Pinging $URL"
          # max-time 90s per coprire il cold-start di Render (può prendere 30-60s)
          STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" --max-time 90 "$URL")
          BODY=$(cat /tmp/body.txt)
          echo "Status: $STATUS"
          echo "Body:   $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Ping fallito"
            exit 1
          fi
          echo "✅ Backend sveglio"
